windowrule = opacity 0.80 0.80, match:class ^(io.github.flattool.Warehouse)$ # Warehouse-Gtk

# █▀▀ █░░ █▀█ ▄▀█ ▀█▀   █▀█ █░█ █░░ █▀▀ █▀
