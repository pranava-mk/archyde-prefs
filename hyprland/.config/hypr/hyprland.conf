#? Read https://hydeproject.pages.dev/en/configuring/hyprland/ for the full documentation.


source = ./keybindings.conf # Keyboard shortcuts
source = ./windowrules.conf # Window rules
source = ./monitors.conf # Monitor configuration
source = ./userprefs.conf # Your hyprland configuration // Edit this file to change your Hyprland configuration

# xdg-desktop-portal - required for flameshot and screen capture on Wayland
exec-once = ~/.local/lib/hyde/resetxdgportal.sh

# hyprdim - temporary window dimming on focus switch
# --strength: dimming intensity (0.0-1.0)
# --duration: ms before removing dim
exec-once = hyprdim --strength 0.7 --duration 800

# Brave - pre-launch at login to warm up disk cache for faster opens
exec-once = brave --no-startup-window

# cliphist - Wayland clipboard manager with image support (current)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Clipse option (commented out - TUI takes up too much space)
# exec-once = clipse -listen
